<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratos</title>
  <link rel="stylesheet" href="../../style/contracts.css">
</head>
<body>
  <main class="page" id="app">
    <header class="page__header">
      <h1 class="page__title">Contratos</h1>
      <button class="btn btn--primary" id="btn-new-contract">Novo contrato</button>
    </header>
    <div class="toolbar">
      <div class="toolbar__search">
        <input class="input" type="search" id="search" placeholder="Buscar por contratante, documento ou modelo…" autocomplete="off">
      </div>
      <select class="select" id="filter-status">
        <option value="">Todos os status</option>
        <option value="not_sent">Não enviado</option>
        <option value="awaiting_signature">Aguardando assinatura</option>
        <option value="signed">Assinado</option>
        <option value="cancelled">Cancelado</option>
      </select>
      <select class="select" id="sort-field">
        <option value="">Ordenar por…</option>
        <option value="contractorName">Contratante</option>
        <option value="model">Modelo</option>
        <option value="createdAt">Data</option>
        <option value="status">Status</option>
      </select>
      <select class="select" id="sort-dir">
        <option value="asc">Crescente</option>
        <option value="desc">Decrescente</option>
      </select>
    </div>
    <div class="table-wrapper">
      <table class="table">
        <thead class="table__head">
          <tr>
            <th class="table__th table__th--sortable" data-col="model">
              <span class="table__th-inner">Modelo <span class="table__sort-icon">↕</span></span>
            </th>
            <th class="table__th table__th--sortable" data-col="contractorName">
              <span class="table__th-inner">Contratante <span class="table__sort-icon">↕</span></span>
            </th>
            <th class="table__th">Documento</th>
            <th class="table__th">Endereço</th>
            <th class="table__th table__th--sortable" data-col="status">
              <span class="table__th-inner">Status <span class="table__sort-icon">↕</span></span>
            </th>
            <th class="table__th">Ações</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination" hidden>
      <span class="pagination__info" id="pagination-info"></span>
      <div class="pagination__controls" id="pagination-controls"></div>
    </div>
    <div class="state" id="state-loading" hidden>
      <div class="spinner"></div>
      <span class="state__title">Carregando...</span>
    </div>
    <div class="state" id="state-empty" hidden>
      <span class="state__title">Nenhum contrato encontrado</span>
      <span class="state__desc">Tente ajustar os filtros ou crie um novo contrato.</span>
    </div>
    <div class="state" id="state-error" hidden>
      <span class="state__title">Erro ao carregar contratos</span>
      <span class="state__desc" id="error-message"></span>
      <button class="btn btn--ghost" id="btn-retry">Tentar novamente</button>
    </div>
  </main>

  <div class="modal-backdrop" id="modal-details" hidden>
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Detalhes do contrato</h2>
        <button class="modal__close" data-close="modal-details">&times;</button>
      </div>
      <div class="modal__body">
        <div class="detail-grid" id="detail-content"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close="modal-details">Fechar</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-preview" hidden>
    <div class="modal modal--wide">
      <div class="modal__header">
        <h2 class="modal__title">Prévia do contrato</h2>
        <button class="modal__close" data-close="modal-preview">&times;</button>
      </div>
      <div class="modal__body">
        <div class="preview" id="preview-content"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close="modal-preview">Fechar</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-form" hidden>
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Novo contrato</h2>
        <button class="modal__close" data-close="modal-form">&times;</button>
      </div>
      <div class="modal__body">
        <form class="form-grid" id="contract-form" novalidate>
          <div class="form-group">
            <label class="form-group__label form-group__label--required" for="f-model">Modelo</label>
            <select class="select" id="f-model" name="model">
              <option value="">Selecione...</option>
              <option value="Prestação de Serviços">Prestação de Serviços</option>
              <option value="Locação de Imóvel">Locação de Imóvel</option>
              <option value="Compra e Venda">Compra e Venda</option>
              <option value="Consultoria">Consultoria</option>
            </select>
            <span class="form-group__error" id="err-model"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-name">Nome do contratante</label>
              <input class="input" type="text" id="f-name" name="contractorName" autocomplete="off">
              <span class="form-group__error" id="err-name"></span>
            </div>
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-email">E-mail</label>
              <input class="input" type="email" id="f-email" name="email" autocomplete="off">
              <span class="form-group__error" id="err-email"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-doctype">Tipo de documento</label>
              <select class="select" id="f-doctype" name="documentType">
                <option value="">Selecione...</option>
                <option value="CPF">CPF</option>
                <option value="CNPJ">CNPJ</option>
              </select>
              <span class="form-group__error" id="err-doctype"></span>
            </div>
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-doc">Documento</label>
              <input class="input" type="text" id="f-doc" name="document" autocomplete="off">
              <span class="form-group__error" id="err-doc"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-zip">CEP</label>
              <input class="input" type="text" id="f-zip" name="zipCode" maxlength="9" autocomplete="off">
              <span class="form-group__error" id="err-zip"></span>
            </div>
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-address">Endereço</label>
              <input class="input" type="text" id="f-address" name="address" autocomplete="off">
              <span class="form-group__error" id="err-address"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-number">Número</label>
              <input class="input" type="text" id="f-number" name="number" autocomplete="off">
              <span class="form-group__error" id="err-number"></span>
            </div>
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-neighborhood">Bairro</label>
              <input class="input" type="text" id="f-neighborhood" name="neighborhood" autocomplete="off">
              <span class="form-group__error" id="err-neighborhood"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-city">Cidade</label>
              <input class="input" type="text" id="f-city" name="city" autocomplete="off">
              <span class="form-group__error" id="err-city"></span>
            </div>
            <div class="form-group">
              <label class="form-group__label form-group__label--required" for="f-state">UF</label>
              <input class="input" type="text" id="f-state" name="state" maxlength="2" autocomplete="off">
              <span class="form-group__error" id="err-state"></span>
            </div>
          </div>
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close="modal-form">Cancelar</button>
        <button class="btn btn--primary" id="btn-submit-form">Salvar</button>
      </div>
    </div>
  </div>
  <script type="module" src="../../scripts/contracts/list.js"></script>
</body>
</html>
